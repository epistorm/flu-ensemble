name: Update Forecast Data and Deploy Dashboard

on:
  schedule:
    - cron: '0 13 * * 4'  # Every Thursday at 1 PM UTC

  # Allow manual trigger
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  update-data:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 1
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Fetch forecast data
        run: |
          echo "Fetching forecast data..."
          python scripts/fetch_data.py

      - name: Create ensemble forecasts
        env:
          COVIDCAST_API_KEY: ${{ secrets.COVIDCAST_API_KEY }}
        run: |
          echo "Creating ensemble forecasts..."
          python scripts/create_ensemble_forecasts.py

      - name: Calculate scores
        run: |
          echo "Calculating scores..."
          python scripts/calculate_scores.py

      - name: Generate dashboard JSON
        run: |
          echo "Generating dashboard data..."
          python scripts/preprocess.py

      - name: Commit and push if changed
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"

          git add data/ docs/data/

          if git diff --staged --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          git commit -m "Update forecast data and scores - $(date +'%Y-%m-%d')"
          git pull --rebase origin main
          git push origin main

  deploy-dashboard:
    needs: update-data
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
